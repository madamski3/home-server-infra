services:
  lightdash:
    image: lightdash/lightdash:latest
    restart: unless-stopped
    depends_on:
      lightdash-db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - '${TAILSCALE_IP}:8087:8080'
    environment:
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET}
      PGHOST: lightdash-db
      PGPORT: 5432
      PGUSER: lightdash
      PGPASSWORD: ${LIGHTDASH_DB_PASSWORD}
      PGDATABASE: lightdash
      SITE_URL: ${SITE_URL}
      SECURE_COOKIES: 'false'
      TRUST_PROXY: '1'
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: lightdash
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: 'true'
      PORT: 8080
    volumes:
      - ./data/lightdash:/home/user/.lightdash
    networks:
      - server-network

  lightdash-db:
    image: postgres:15
    restart: unless-stopped
    hostname: lightdash-db
    environment:
      POSTGRES_USER: lightdash
      POSTGRES_PASSWORD: ${LIGHTDASH_DB_PASSWORD}
      POSTGRES_DB: lightdash
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - server-network
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'lightdash']
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '${TAILSCALE_IP}:9001:9001'
    volumes:
      - ./data/minio:/data
    networks:
      - server-network

networks:
  server-network:
    external: true
